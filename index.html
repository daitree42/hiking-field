<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1612;
    --ink-light: #4a3f35;
    --ink-faint: #8a7a6e;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --paper-darker: #e0d5c0;
    --accent: #7a3b2e;
    --accent-light: #b05a45;
    --rule: #c8b89a;
    --font-serif: 'Noto Serif SC', serif;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-en: 'IM Fell English SC', serif;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--font-serif); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; height: auto; display: block; }

  /* ===== NAV ===== */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--paper); border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 52px;
  }
  .nav-brand { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; }
  .nav-brand svg { display: block; }
  .nav-title { font-size: 1rem; letter-spacing: 0.25em; color: var(--ink-light); font-weight: 300; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links button {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-serif); font-size: 0.8rem; color: var(--ink-faint);
    letter-spacing: 0.1em; padding: 4px 0; border-bottom: 1px solid transparent;
    transition: color 0.25s, border-color 0.25s;
  }
  .nav-links button.active, .nav-links button:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .page { display: none; padding-top: 52px; min-height: 100vh; }
  .page.active { display: block; }

  /* ===== BACK BUTTON ===== */
  .back-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: none; border: none; cursor: pointer;
    font-family: var(--font-serif); font-size: 0.8rem; color: var(--ink-faint);
    letter-spacing: 0.1em; padding: 8px 0; margin-bottom: 1.5rem;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn svg { width: 16px; height: 16px; }

  /* ===== HOME PAGE ===== */
  .home-wrap { max-width: 680px; margin: 0 auto; padding: 0 2rem 6rem; }

  /* Banner */
  .home-banner {
    width: 100%; padding-top: 2rem; margin-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
  }
  .home-banner svg { display: block; width: 100%; height: auto; }
  .home-header-text { padding: 1.8rem 0; }
  .home-header-text h1 {
    font-family: var(--font-serif); font-size: 2rem; font-weight: 300;
    letter-spacing: 0.35em; color: var(--ink); margin-bottom: 0.5rem;
  }
  .home-header-text .subtitle {
    font-size: 0.7rem; color: var(--ink-faint); letter-spacing: 0.25em;
    font-family: var(--font-en);
  }
  .home-header-text .tagline {
    font-size: 0.88rem; color: var(--ink-light); line-height: 1.7;
    margin-top: 1.2rem; max-width: 480px;
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 6rem; margin-top: 1rem; }
  .timeline::before {
    content: ''; position: absolute; left: 4.5rem; top: 0.6rem; bottom: 0;
    width: 1px; background: var(--rule);
  }
  .timeline-year { position: relative; margin-bottom: 2.5rem; }
  .year-label {
    position: absolute; left: -5.5rem; top: 0.15rem;
    font-family: var(--font-en); font-size: 0.7rem; color: var(--ink-faint);
    letter-spacing: 0.1em; width: 4rem; text-align: right;
  }
  .timeline-entry {
    position: relative; margin-bottom: 1.4rem; cursor: pointer;
    transition: opacity 0.2s;
  }
  .entry-icon {
    position: absolute; left: -2.1rem; top: 0.15rem;
    width: 20px; height: 20px;
  }
  .entry-icon svg { width: 20px; height: 20px; }
  .timeline-entry:hover .entry-icon svg path,
  .timeline-entry:hover .entry-icon svg polyline,
  .timeline-entry:hover .entry-icon svg line { stroke: var(--accent); }
  .entry-text { padding-right: 0.5rem; }
  .entry-date {
    font-family: var(--font-en); font-size: 0.68rem; color: var(--ink-faint);
    letter-spacing: 0.06em; margin-bottom: 0.1rem;
  }
  .entry-title {
    font-size: 0.95rem; font-weight: 400; color: var(--ink-light);
    letter-spacing: 0.04em; transition: color 0.2s; line-height: 1.5;
  }
  .timeline-entry:hover .entry-title { color: var(--accent); }
  .entry-location {
    font-size: 0.72rem; color: var(--ink-faint); margin-top: 0.1rem;
    font-family: var(--font-sans); letter-spacing: 0.05em;
  }
  .entry-dot {
    display: none;
  }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--ink-faint);
  }
  .empty-state svg { margin: 0 auto 1.5rem; display: block; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; line-height: 1.7; }

  /* ===== ARTICLE PAGE ===== */
  .article-wrap { max-width: 720px; margin: 0 auto; padding: 2rem 2rem 6rem; }

  .article-meta { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--rule); }
  .article-date {
    font-family: var(--font-en); font-size: 0.72rem; color: var(--ink-faint);
    letter-spacing: 0.12em; margin-bottom: 0.8rem;
  }
  .article-title {
    font-size: 1.6rem; font-weight: 300; letter-spacing: 0.1em;
    line-height: 1.5; margin-bottom: 0.5rem;
  }
  .article-location {
    font-size: 0.82rem; color: var(--ink-faint); font-family: var(--font-sans);
    letter-spacing: 0.1em; margin-bottom: 1rem;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag {
    font-size: 0.68rem; color: var(--ink-faint); letter-spacing: 0.08em;
    padding: 2px 10px; border: 1px solid var(--rule);
    font-family: var(--font-sans); border-radius: 2px;
  }
  .tag.accent { color: var(--accent); border-color: var(--accent-light); background: rgba(122,59,46,0.04); }

  /* Stats bar */
  .stats-bar {
    display: flex; flex-wrap: wrap; gap: 1.5rem;
    padding: 1.2rem 0; margin-bottom: 2rem;
    border-bottom: 1px solid var(--rule);
  }
  .stat-item { display: flex; flex-direction: column; }
  .stat-value {
    font-family: var(--font-en); font-size: 1.1rem; color: var(--ink);
    letter-spacing: 0.05em;
  }
  .stat-label {
    font-size: 0.62rem; color: var(--ink-faint); letter-spacing: 0.12em;
    font-family: var(--font-sans); margin-top: 0.15rem;
  }

  /* Summary block */
  .summary-block {
    background: var(--paper-dark); padding: 1.2rem 1.5rem; margin-bottom: 2rem;
    border: 1px solid var(--rule); font-size: 0.9rem; line-height: 1.8;
    color: var(--ink-light);
  }

  /* Article body */
  .article-body { line-height: 1.9; font-size: 0.95rem; color: var(--ink-light); }
  .article-body p { margin-bottom: 1.3rem; text-indent: 2em; }
  .article-body p.no-indent { text-indent: 0; }
  .article-body h3 {
    font-size: 1.1rem; font-weight: 400; letter-spacing: 0.08em;
    margin: 2rem 0 0.8rem; color: var(--ink);
  }
  .article-body .route-note {
    background: var(--paper-dark); padding: 1rem 1.3rem; margin: 1.5rem 0;
    border-left: 3px solid var(--accent-light); font-size: 0.85rem;
    line-height: 1.7; color: var(--ink-light);
  }
  .article-body .route-note strong {
    font-weight: 600; color: var(--accent);
  }

  /* Photo gallery placeholder */
  .photo-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem;
    margin: 2rem 0;
  }
  .photo-grid .photo {
    aspect-ratio: 4/3; background: var(--paper-darker);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-size: 0.7rem; font-family: var(--font-sans);
    letter-spacing: 0.05em; border: 1px solid var(--rule);
  }
  .photo-grid .photo:first-child { grid-column: 1 / -1; aspect-ratio: 16/9; }
  .photo-grid .photo.placeholder::after {
    content: '📷 照片'; opacity: 0.5;
  }

  /* ===== ARCHIVE PAGE ===== */
  .archive-wrap { max-width: 600px; margin: 0 auto; padding: 3rem 2rem 6rem; }
  .archive-wrap h2 {
    font-size: 1.3rem; font-weight: 300; letter-spacing: 0.2em;
    margin-bottom: 2.5rem; color: var(--ink);
  }
  .archive-list { list-style: none; }
  .archive-year { margin-bottom: 2rem; }
  .archive-year-header {
    font-family: var(--font-en); font-size: 0.8rem; color: var(--ink-faint);
    letter-spacing: 0.1em; margin-bottom: 0.8rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--rule);
  }
  .archive-item {
    display: flex; align-items: baseline; gap: 1rem;
    padding: 0.4rem 0; cursor: pointer;
    transition: opacity 0.2s;
  }
  .archive-item:hover { opacity: 0.7; }
  .archive-item-date {
    font-family: var(--font-en); font-size: 0.68rem; color: var(--ink-faint);
    letter-spacing: 0.05em; min-width: 3rem;
  }
  .archive-item-title {
    font-size: 0.88rem; color: var(--ink-light); letter-spacing: 0.03em;
  }
  .archive-empty { color: var(--ink-faint); line-height: 1.7; }

  /* ===== ABOUT PAGE ===== */
  .about-wrap { max-width: 600px; margin: 0 auto; padding: 3rem 2rem 6rem; }
  .about-wrap h2 {
    font-size: 1.3rem; font-weight: 300; letter-spacing: 0.2em;
    margin-bottom: 1.5rem; color: var(--ink);
  }
  .about-content { line-height: 1.9; font-size: 0.92rem; color: var(--ink-light); }
  .about-content p { margin-bottom: 1rem; }
  .about-content .sig {
    margin-top: 2rem; font-family: var(--font-en); font-size: 0.8rem;
    color: var(--ink-faint); letter-spacing: 0.1em;
  }
  .about-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
    margin: 2rem 0; padding: 1.5rem; background: var(--paper-dark);
    border: 1px solid var(--rule);
  }
  .about-stat { text-align: center; }
  .about-stat-num {
    font-family: var(--font-en); font-size: 1.6rem; color: var(--accent);
    letter-spacing: 0.05em;
  }
  .about-stat-label {
    font-size: 0.65rem; color: var(--ink-faint); letter-spacing: 0.12em;
    font-family: var(--font-sans); margin-top: 0.2rem;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .nav-links { gap: 1.2rem; }
    .home-wrap, .article-wrap, .archive-wrap, .about-wrap { padding-left: 1rem; padding-right: 1rem; }
    .home-header-text h1 { font-size: 1.5rem; }
    .timeline { padding-left: 4.5rem; }
    .timeline::before { left: 3rem; }
    .year-label { left: -4rem; width: 3rem; font-size: 0.6rem; }
    .entry-icon { left: -1.6rem; }
    .article-title { font-size: 1.3rem; }
    .stats-bar { gap: 1rem; }
    .stat-value { font-size: 0.95rem; }
    .photo-grid { grid-template-columns: 1fr; }
    .photo-grid .photo:first-child { grid-column: 1; }
    .about-stats { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 400px) {
    .nav-title { font-size: 0.85rem; letter-spacing: 0.15em; }
    .nav-links { gap: 0.8rem; }
    .nav-links button { font-size: 0.72rem; }
    .about-stats { grid-template-columns: 1fr; gap: 0.8rem; }
  }
</style>
</head>

      <p>「徒步田野」是一个人的徒步记录。每一篇都是一次行走的切片——穿过城市老街、郊野小径、山间古道。</p>
      <p>没有征服多少座山的雄心，只是想好好看看走过的路。记下地名、路程、天气，还有那些让脚步慢下来的事物：一堵旧墙的光影、一棵老树的姿态、一段石板路被踩出的光泽。</p>
      <p>走得多了，脚下的土地会变成一本可以翻来翻去的书。</p>

// ===== STATE =====
let currentPage = 'home';

// ===== NAVIGATION =====
function navigateTo(page, data) {
  // hide all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  // show target
  const target = document.getElementById('page-' + page);
  if (target) target.classList.add('active');
  // update nav
  document.querySelectorAll('.nav-links button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === page);
  });
  // scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
  currentPage = page;

  if (page === 'archive') renderArchive();
  if (page === 'about') renderAboutStats();
}

// ===== RENDER TIMELINE =====
function renderTimeline() {
  const container = document.getElementById('timeline');
  // remove all children, keep empty-state
  const emptyState = document.getElementById('timeline-empty');

  if (HIKES.length === 0) {
    emptyState.style.display = 'block';
    // remove any rendered entries
    container.querySelectorAll('.timeline-year').forEach(el => el.remove());
    return;
  }
  emptyState.style.display = 'none';

  // Group by year
  const byYear = {};
  HIKES.forEach(h => {
    const year = h.date.slice(0, 4);
    if (!byYear[year]) byYear[year] = [];
    byYear[year].push(h);
  });

  const years = Object.keys(byYear).sort((a, b) => b - a);

  // Remove existing timeline entries
  container.querySelectorAll('.timeline-year').forEach(el => el.remove());

  years.forEach(year => {
    const yearGroup = document.createElement('div');
    yearGroup.className = 'timeline-year';

    const label = document.createElement('span');
    label.className = 'year-label';
    label.textContent = year;
    yearGroup.appendChild(label);

    byYear[year].forEach(hike => {
      const entry = document.createElement('div');
      entry.className = 'timeline-entry';
      entry.onclick = () => openArticle(hike.id);

      entry.innerHTML = `
        <div class="entry-icon">
          <svg viewBox="0 0 20 20" fill="none">
            <polyline points="4,16 8,8 10,11 14,4 17,16" stroke="var(--ink-faint)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="16" x2="17" y2="16" stroke="var(--ink-faint)" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="entry-text">
          <div class="entry-date">${formatDate(hike.date)}</div>
          <div class="entry-title">${hike.title}</div>
          <div class="entry-location">${hike.location} · ${hike.distance}</div>
        </div>
      `;
      yearGroup.appendChild(entry);
    });

    container.appendChild(yearGroup);
  });
}

// ===== OPEN ARTICLE =====
function openArticle(id) {
  const hike = HIKES.find(h => h.id === id);
  if (!hike) return;

  const container = document.getElementById('article-content');

  const tagsHTML = hike.tags.map(t =>
    `<span class="tag${t === '长距离' || t === '夜行' ? ' accent' : ''}">${t}</span>`
  ).join('');

  const bodyHTML = hike.body.map(p => `<p>${p}</p>`).join('');

  container.innerHTML = `
    <div class="article-meta">
      <div class="article-date">${formatDate(hike.date)}</div>
      <h2 class="article-title">${hike.title}</h2>
      <div class="article-location">${hike.location}</div>
      <div class="tags">${tagsHTML}</div>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value">${hike.distance}</span>
        <span class="stat-label">距离</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">${hike.duration}</span>
        <span class="stat-label">用时</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">${hike.elevation}</span>
        <span class="stat-label">累计爬升</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">${hike.pace}</span>
        <span class="stat-label">配速</span>
      </div>
    </div>

    <div class="summary-block">${hike.summary}</div>

    <div class="article-body">
      ${bodyHTML}
      <div class="route-note">
        <strong>实用信息</strong><br>
        ${hike.practical}
      </div>
    </div>
  `;

  navigateTo('article');
}

// ===== RENDER ARCHIVE =====
function renderArchive() {
  const container = document.getElementById('archive-list');
  container.innerHTML = '';

  if (HIKES.length === 0) {
    container.innerHTML = '<p class="archive-empty">还没有记录。</p>';
    return;
  }

  const byYear = {};
  HIKES.forEach(h => {
    const y = h.date.slice(0, 4);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(h);
  });

  const years = Object.keys(byYear).sort((a, b) => b - a);

  years.forEach(year => {
    const yearSection = document.createElement('div');
    yearSection.className = 'archive-year';

    yearSection.innerHTML = `<div class="archive-year-header">${year}</div>`;

    byYear[year].forEach(hike => {
      const item = document.createElement('div');
      item.className = 'archive-item';
      item.onclick = () => openArticle(hike.id);
      item.innerHTML = `
        <span class="archive-item-date">${hike.date.slice(5)}</span>
        <span class="archive-item-title">${hike.title} <span style="font-size:0.7rem;color:var(--ink-faint);font-family:var(--font-sans);">${hike.location}</span></span>
      `;
      yearSection.appendChild(item);
    });
    container.appendChild(yearSection);
  });
}

// ===== RENDER ABOUT STATS =====
function renderAboutStats() {
  const container = document.getElementById('about-stats');
  if (!container) return;
  const totalHikes = HIKES.length;
  const totalDist = HIKES.reduce((sum, h) => {
    const km = parseFloat(h.distance);
    return isNaN(km) ? sum : sum + km;
  }, 0);
  const totalElev = HIKES.reduce((sum, h) => {
    const m = parseFloat(h.elevation);
    return isNaN(m) ? sum : sum + m;
  }, 0);

  container.innerHTML = `
    <div class="about-stat">
      <div class="about-stat-num">${totalHikes}</div>
      <div class="about-stat-label">次徒步</div>
    </div>
    <div class="about-stat">
      <div class="about-stat-num">${totalDist.toFixed(0)}</div>
      <div class="about-stat-label">总公里</div>
    </div>
    <div class="about-stat">
      <div class="about-stat-num">${totalElev.toFixed(0)}</div>
      <div class="about-stat-label">累计爬升 (m)</div>
    </div>
  `;
}

// ===== HELPERS =====
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}.${month}.${day}`;
}

// ===== EVENT BINDING =====
document.addEventListener('DOMContentLoaded', () => {
  // Nav buttons
  document.querySelectorAll('.nav-links button').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.page));
  });
  // Brand click -> home
  document.querySelector('.nav-brand').addEventListener('click', () => navigateTo('home'));

  // Initial render
  renderTimeline();
  renderAboutStats();
});
</script>
